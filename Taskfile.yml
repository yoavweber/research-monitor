version: '3'

tasks:
  run:
    desc: Run the API
    cmds:
      - go run ./cmd/api

  build:
    desc: Build the API binary
    cmds:
      - go build -o bin/api ./cmd/api

  seed:
    desc: Seed initial source records (idempotent)
    cmds:
      - go run ./cmd/seed

  test:
    desc: Run unit tests
    cmds:
      - go test ./...

  test:int:
    desc: Run integration tests
    cmds:
      - go test -tags=integration ./tests/integration/...

  test:manual:
    desc: 'Run manual (live network) tests. Filter with RUN=<TestName>, e.g. `task test:manual RUN=TestLiveArxiv_FullPath`.'
    vars:
      RUN: '.'
    cmds:
      - go test -tags=manual -count=1 -v -run "{{.RUN}}" ./tests/manual/...

  lint:
    desc: Run golangci-lint
    cmds:
      - golangci-lint run

  tidy:
    desc: go mod tidy
    cmds:
      - go mod tidy

  swag:
    desc: Regenerate OpenAPI docs (writes ./docs)
    cmds:
      - swag init -g cmd/api/main.go -o docs --parseInternal --parseDependency

  db:reset:
    desc: Delete the SQLite DB and restart
    cmds:
      - rm -f data/app.db
      - go run ./cmd/api
